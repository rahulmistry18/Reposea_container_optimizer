<!DOCTYPE html>

<title>RepoSea — Fleet Map</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#071E2E;color:#E8F4F6;font-family:'JetBrains Mono',monospace;height:100%;overflow:hidden}
#map{position:absolute;inset:0}
.leaflet-container{background:#040F1A}

/* ── Top bar ── */
.bar{position:absolute;top:0;left:0;right:0;z-index:1000;height:48px;background:rgba(7,30,46,.96);border-bottom:1px solid rgba(232,244,246,.1);display:flex;align-items:center;gap:12px;padding:0 16px;backdrop-filter:blur(6px)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-box{width:26px;height:26px;background:#0A9396;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-name{font-family:'EB Garamond',serif;font-size:16px;color:#E8F4F6}.logo-name span{color:#0A9396}
.sep{width:1px;height:14px;background:rgba(232,244,246,.1)}
.ptitle{font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(232,244,246,.32)}
.bar-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn{font-size:8.5px;letter-spacing:.07em;text-transform:uppercase;padding:4px 9px;border-radius:2px;border:1px solid rgba(232,244,246,.15);cursor:pointer;color:rgba(232,244,246,.4);background:transparent;text-decoration:none;transition:all .15s}
.btn:hover{color:#C4E0E5;border-color:rgba(10,147,150,.5)}
.btn.primary{color:#0A9396;border-color:rgba(10,147,150,.4);background:rgba(10,147,150,.1)}
.dot{width:6px;height:6px;border-radius:50%;background:#0A9396;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
.ts{font-size:8.5px;color:rgba(232,244,246,.22)}

/* ── KPI strip ── */
.kpibar{position:absolute;top:48px;left:0;right:0;z-index:999;background:rgba(7,30,46,.94);border-bottom:1px solid rgba(232,244,246,.08);display:flex;padding:0 16px;backdrop-filter:blur(4px)}
.kpi{display:flex;flex-direction:column;justify-content:center;padding:6px 13px;border-right:1px solid rgba(232,244,246,.08);min-width:105px;gap:2px}
.kpi:last-child{border-right:none;margin-left:auto}
.kl{font-size:7px;letter-spacing:.13em;text-transform:uppercase;color:rgba(232,244,246,.25)}
.kv{font-family:'EB Garamond',serif;font-size:17px;font-weight:500;line-height:1;color:#E8F4F6}
.kv.r{color:#E05252}.kv.a{color:#D4A030}.kv.t{color:#0A9396}.kv.o{color:#FF6B00}
.ks{font-size:7px;color:rgba(232,244,246,.24)}

/* ── Legend ── */
.legend{position:absolute;bottom:16px;left:16px;z-index:999;background:rgba(7,30,46,.93);border:1px solid rgba(232,244,246,.1);border-radius:3px;padding:10px 12px;min-width:170px}
.ltitle{font-size:7.5px;letter-spacing:.13em;text-transform:uppercase;color:rgba(232,244,246,.25);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(232,244,246,.08)}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.lr:last-child{margin-bottom:0}
.lc{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.lsq{width:9px;height:9px;flex-shrink:0;border:1.5px solid rgba(232,244,246,.35)}
.ll{font-size:8.5px;color:rgba(232,244,246,.5)}
.lsep{border-top:1px solid rgba(232,244,246,.08);margin:5px 0}

/* ── Filter panel ── */
.filters{position:absolute;bottom:16px;right:16px;z-index:999;background:rgba(7,30,46,.93);border:1px solid rgba(232,244,246,.1);border-radius:3px;padding:10px 12px;min-width:170px}
.ftitle{font-size:7.5px;letter-spacing:.13em;text-transform:uppercase;color:rgba(232,244,246,.25);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid rgba(232,244,246,.08)}
.fg{margin-bottom:7px}
.fg:last-child{margin-bottom:0}
.fgl{font-size:7.5px;color:rgba(232,244,246,.26);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.fbtns{display:flex;flex-wrap:wrap;gap:3px}
.fb{font-size:7.5px;padding:2px 6px;border-radius:2px;border:1px solid rgba(232,244,246,.12);cursor:pointer;color:rgba(232,244,246,.38);background:transparent;transition:all .12s}
.fb:hover{color:#C4E0E5}
.fb.on{color:#0A9396;border-color:rgba(10,147,150,.4);background:rgba(10,147,150,.1)}
.fb.on.r{color:#E05252;border-color:rgba(224,82,82,.4);background:rgba(224,82,82,.1)}
.fb.on.a{color:#D4A030;border-color:rgba(212,160,48,.4);background:rgba(212,160,48,.1)}

/* ── Popups ── */
.leaflet-popup-content-wrapper{background:rgba(7,30,46,.97)!important;border:1px solid rgba(232,244,246,.12)!important;border-radius:3px!important;box-shadow:0 4px 24px rgba(0,0,0,.5)!important;padding:0!important;color:#E8F4F6!important}
.leaflet-popup-content{margin:0!important;padding:0!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{color:rgba(232,244,246,.3)!important;font-size:15px!important;top:6px!important;right:8px!important}
.leaflet-popup-close-button:hover{color:#E8F4F6!important}
.popup{padding:12px 14px;min-width:210px}
.pid{font-size:12px;font-weight:700;letter-spacing:.04em;margin-bottom:2px}
.pvessel{font-size:9.5px;color:rgba(232,244,246,.4);margin-bottom:7px}
.pstg{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:2px;font-size:7.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border:1px solid;margin-bottom:8px}

.pstg.GATE_IN{color:#C4E0E5;border-color:rgba(232,244,246,.15);background:rgba(232,244,246,.05)}
.pstg.ARRIVED{color:#64C8CC;border-color:rgba(100,200,204,.3);background:rgba(100,200,204,.08)}
.pstg.IN_FREE_DAYS{color:#D4A030;border-color:rgba(212,160,48,.4);background:rgba(212,160,48,.1)}
.pstg.OVERDUE{color:#E05252;border-color:rgba(224,82,82,.4);background:rgba(224,82,82,.1)}
.prows{display:flex;flex-direction:column;gap:3px;border-top:1px solid rgba(232,244,246,.08);padding-top:7px}

.pv{font-size:9.5px;font-weight:500}
.pv.r{color:#E05252}.pv.a{color:#D4A030}.pv.t{color:#0A9396}
.pprog{border-top:1px solid rgba(232,244,246,.08);padding-top:7px;margin-top:2px}
.pprog-lbl{font-size:7.5px;letter-spacing:.08em;text-transform:uppercase;color:rgba(232,244,246,.27);margin-bottom:3px;display:flex;justify-content:space-between}
.pprog-track{height:3px;background:rgba(232,244,246,.07);border-radius:2px;overflow:hidden}
.pprog-fill{height:100%;border-radius:2px}
/* conflict popup */
.cpopup{padding:12px 14px;min-width:200px;max-width:255px}
.ctitle{font-size:11px;font-weight:700;margin-bottom:6px;letter-spacing:.02em}

// Get route — try both directions
function getRoute(o, d) {
  const key = o+'-'+d;
  const rkey = d+'-'+o;
  if (R[key]) return R[key];
  if (R[rkey]) return R[rkey].slice().reverse();
  // Straight line fallback (only for truly unknown pairs)
  const op = P[o], dp = P[d];
  return (op && dp) ? [op, dp] : null;
}

// Interpolate position at fraction t (0–1) along a route array
function routePos(route, t) {
  if (!route || route.length < 2) return null;
  const n = route.length - 1;
  const seg = Math.min(Math.floor(t * n), n - 1);
  const f   = t * n - seg;
  const a   = route[seg], b = route[seg + 1];
  return [a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f];
}

// ══ Icon factories ════════════════════════════════════════════════════════
function containerDot(color, radius, pulsing) {
  const pulse = pulsing
    ? `<circle cx="10" cy="10" r="${radius+6}" fill="${color}" opacity="0.15"/>`
    : '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
    ${pulse}
    <circle cx="10" cy="10" r="${radius}" fill="${color}" opacity="0.9"/>
    <circle cx="10" cy="10" r="${radius*0.42}" fill="white" opacity="0.6"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [20,20], iconAnchor: [10,10] });
}

function portSquare() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 8 8">
    <rect x="1" y="1" width="6" height="6" rx="1"
      fill="rgba(232,244,246,0.08)" stroke="rgba(232,244,246,0.32)" stroke-width="1"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [8,8], iconAnchor: [4,4] });
}

function conflictTriangle(color) {
  // Triangle — clearly distinct from circular container dots
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 26 26">
    <polygon points="13,2 24,22 2,22" fill="${color}" opacity="0.88" stroke="rgba(255,255,255,0.6)" stroke-width="1"/>
    <text x="13" y="17" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="sans-serif">!</text>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [26,26], iconAnchor: [13,22] });
}

// ══ Popup builders ════════════════════════════════════════════════════════
function containerPopup(d) {
  const dtl   = Number(d.days_to_lfd || 0);
  const dc    = dtl <= 0 ? 'r' : dtl <= 2 ? 'a' : 't';
  const pct   = Number(d.voyage_pct || 0);
  const pc    = pct >= 80 ? '#E05252' : pct >= 50 ? '#D4A030' : '#0A9396';
  const burn  = Number(d.burn_rate_usd || 0);
  const proj  = Number(d.projected_exposure_7d_usd || 0);
  const vessel = d.vessel_name || '—';
  return `<div class="popup">
    <div class="pid">${d.container_id}</div>
    <div class="pvessel">${vessel}</div>
    <span class="pstg ${d.lifecycle_stage}">${SL[d.lifecycle_stage] || d.lifecycle_stage}</span>
    <div class="prows">
      <div class="prow"><div class="pk">Route</div><div class="pv">${d.origin_locode} → ${d.dest_locode}</div></div>
      <div class="prow"><div class="pk">Lane</div><div class="pv">${d.trade_lane_label || d.trade_lane}</div></div>
      <div class="prow"><div class="pk">Lease</div><div class="pv">${d.lease_type}</div></div>
      <div class="prow"><div class="pk">Buffer</div><div class="pv ${dc}">${dtl >= 0 ? '+' : ''}${dtl.toFixed(1)}d</div></div>
      <div class="prow"><div class="pk">Exposure</div><div class="pv ${dtl<=0?'r':''}">
        ${dtl <= 0 ? '$'+Math.round(burn).toLocaleString()+' accrued' : '$'+d.per_diem_rate+'/day'}
      </div></div>
      <div class="prow"><div class="pk">7d Forecast</div><div class="pv a">$${Math.round(proj).toLocaleString()}</div></div>
      <div class="prow"><div class="pk">Strategy</div><div class="pv t" style="font-size:8.5px">${d.repo_strategy || '—'}</div></div>
      <div class="prow"><div class="pk">Priority</div><div class="pv" style="color:${d.priority_score>=9?'#E05252':d.priority_score>=7?'#D4A030':'#0A9396'}">${d.priority_score || 1}/10</div></div>
    </div>
    <div class="pprog">
      <div class="pprog-lbl"><span>Voyage progress</span><span>${pct}%</span></div>
      <div class="pprog-track"><div class="pprog-fill" style="width:${pct}%;background:${pc}"></div></div>
    </div>
  </div>`;
}

function conflictPopup(z) {
  const rows = z.rows.map(([k,v]) =>
    `<div class="crow"><div class="ck">${k}</div><div class="cv" style="color:${k==='Severity'||k==='Status'?z.color:'#E8F4F6'}">${v}</div></div>`
  ).join('');
  return `<div class="cpopup">
    <div class="ctitle" style="color:${z.color}">⚠ ${z.name}</div>
    ${rows}
    <div class="cadv">${z.advisory}</div>
  </div>`;
}

// ══ Render ════════════════════════════════════════════════════════════════
function render() {
  layers.forEach(l => map.removeLayer(l));
  layers = [];

  const visible = DATA.filter(d =>
    fStatus.has(d.action_status) &&
    fStage.has(d.lifecycle_stage) &&
    fLane.has(d.trade_lane)
  );

  const portsDrawn = new Set();

  visible.forEach(d => {
    const o    = d.origin_locode;
    const dest = d.dest_locode;
    const oPos = P[o];
    const dPos = P[dest];
    const route = getRoute(o, dest);
    const color = SC[d.action_status] || '#0A9396';
    const pct   = Math.max(0, Math.min(1, Number(d.voyage_pct || 0) / 100));

    // ── Route arc — single clean polyline, no dots, no dashes ────────────
    if (route && route.length >= 2) {
      const line = L.polyline(route, {
        color:   d.action_status === 'Critical' ? '#E05252'
               : d.action_status === 'Warning'  ? '#D4A030'
               : 'rgba(10,147,150,0.45)',
        weight:  1.2,
        opacity: d.action_status === 'Critical' ? 0.65 : 0.38,
      }).addTo(map);
      layers.push(line);
    }

    // ── Port squares at origin + destination only ─────────────────────────
    [[o, oPos], [dest, dPos]].forEach(([code, pos]) => {
      if (!pos || portsDrawn.has(code)) return;
      portsDrawn.add(code);
      layers.push(L.marker(pos, { icon: portSquare(), interactive: false }).addTo(map));
    });

    // ── Container dot — position determined by stage ──────────────────────
    let lat = 0, lon = 0;

    if (d.lifecycle_stage === 'AT_SEA' && route) {
      // Always compute from route geometry — guarantees ocean placement
      const pos = routePos(route, Math.max(0.03, Math.min(0.97, pct)));
      if (pos) { lat = pos[0]; lon = pos[1]; }
    } else if (d.lifecycle_stage === 'GATE_IN' && oPos) {
      lat = oPos[0]; lon = oPos[1];
    } else if (['ARRIVED','IN_FREE_DAYS','OVERDUE'].includes(d.lifecycle_stage) && dPos) {
      lat = dPos[0]; lon = dPos[1];
    } else {
      // Use stored coordinates as last resort
      lat = Number(d.current_lat || 0);
      lon = Number(d.current_lon || 0);
    }

    if (Math.abs(lat) < 0.1 && Math.abs(lon) < 0.1) return; // skip (0,0)

    const isCrit = d.action_status === 'Critical';
    const r      = d.lifecycle_stage === 'AT_SEA' ? 6 : 5;

    const m = L.marker([lat, lon], {
      icon: containerDot(color, r, isCrit),
      zIndexOffset: isCrit ? 1000 : d.lifecycle_stage === 'AT_SEA' ? 500 : 0,
    })
    .bindPopup(containerPopup(d), { maxWidth: 260 })
    .addTo(map);
    layers.push(m);
  });

  // ── Conflict zone markers — always on top ─────────────────────────────
  CONFLICTS.forEach(z => {
    // Dashed pulsing ring — distinct from container dots
    const ring = L.circle([z.lat, z.lon], {
      radius:      z.sev === 'CRITICAL' ? 160000 : 110000,
      color:       z.color,
      fillColor:   z.color,
      fillOpacity: 0.05,
      weight:      1.5,
      opacity:     0.5,
      dashArray:   '6,5',
    }).addTo(map);
    layers.push(ring);

    const m = L.marker([z.lat, z.lon], {
      icon: conflictTriangle(z.color),
      zIndexOffset: 2000,
    })
    .bindPopup(conflictPopup(z), { maxWidth: 270 })
    .addTo(map);
    layers.push(m);
  });

  renderKPIs(visible);
}

function renderKPIs(visible) {
  const all  = DATA;
  const crit = all.filter(d => d.action_status === 'Critical').length;
  const warn = all.filter(d => d.action_status === 'Warning').length;
  const safe = all.filter(d => d.action_status === 'Safe').length;
  const pen  = all.filter(d => Number(d.days_to_lfd||0) <= 0)
                  .reduce((s,d) => s + Number(d.burn_rate_usd||0), 0);
  const proj = all.reduce((s,d) => s + Number(d.projected_exposure_7d_usd||0), 0);

  const kpis = [
    { l:'Critical',      v: crit,                              c:'r', s:'penalty accruing' },
    { l:'Warning',       v: warn,                              c:'a', s:'≤ 2d buffer' },
    { l:'Safe',          v: safe,                              c:'t', s:'buffer OK' },
    { l:'Penalty',       v: '$'+Math.round(pen).toLocaleString(), c:'', s:'USD today' },
    { l:'7d Forecast',   v: '$'+Math.round(proj).toLocaleString(),c:'r', s:'projected' },
    { l:'Conflict Zones',v: CONFLICTS.length,                  c:'o', s:'active Apr 2026' },
    { l:'Showing',       v: visible.length+'/'+all.length,     c:'', s:'containers' },
  ];

  document.getElementById('kpibar').innerHTML = kpis.map(k =>
    `<div class="kpi">
      <div class="kl">${k.l}</div>
      <div class="kv ${k.c}">${k.v}</div>
      <div class="ks">${k.s}</div>
    </div>`
  ).join('');
}

// ══ Filters ══════════════════════════════════════════════════════════════
document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.f, v = btn.dataset.v;
    const set = f === 'status' ? fStatus : f === 'stage' ? fStage : fLane;
    if (set.has(v)) { set.delete(v); btn.classList.remove('on'); }
    else            { set.add(v);    btn.classList.add('on'); }
    render();
  });
});

async function loadData() {
  try {
    const [cr, sr] = await Promise.all([
      fetch('./data/gold/containers.json?t=' + Date.now()),
      fetch('./data/gold/summary.json?t='    + Date.now()),
    ]);
    DATA = await cr.json();
    const sum = await sr.json();
    document.getElementById('ts-label').textContent =
      'Run #' + (sum.run_count || '?') + ' · ' +
      (sum.generated_at || '').slice(0, 16).replace('T', ' ') + ' UTC';
  } catch(e) {
    DATA = FALLBACK;
    document.getElementById('ts-label').textContent = 'Offline · sample data';
  }
  render();
}

async function doRefresh() {
  const btn = document.querySelector('.btn.primary');
  btn.textContent = '⟳ Loading…'; btn.style.opacity = '0.5';
  await loadData();
  btn.textContent = '✓ Done';
  setTimeout(() => { btn.textContent = '⟳ Refresh'; btn.style.opacity = '1'; }, 1800);
}

loadData();
setInterval(loadData, 5 * 60 * 1000);

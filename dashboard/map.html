<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoSea — Fleet Geomap</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --abyss:#071E2E;--depth1:#0A2840;--teal:#0A9396;--teal-glow:rgba(10,147,150,0.15);
  --teal-dim:rgba(10,147,150,0.35);--foam:#E8F4F6;--foam2:#C4E0E5;
  --mist:rgba(232,244,246,0.06);--mist2:rgba(232,244,246,0.13);
  --alert:#E05252;--alert-dim:rgba(224,82,82,0.15);--alert-bdr:rgba(224,82,82,0.4);
  --warn:#D4A030;--warn-dim:rgba(212,160,48,0.12);--warn-bdr:rgba(212,160,48,0.4);
  --conflict:#FF6B00;
  --mono:'JetBrains Mono',monospace;--serif:'EB Garamond',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--abyss);color:var(--foam);font-family:var(--mono);height:100%;overflow:hidden}
.topbar{position:absolute;top:0;left:0;right:0;z-index:1000;background:rgba(7,30,46,0.96);border-bottom:1px solid var(--mist2);height:48px;padding:0 18px;display:flex;align-items:center;gap:14px;backdrop-filter:blur(6px)}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.brand-mark{width:28px;height:28px;background:var(--teal);display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0}
.brand-name{font-family:var(--serif);font-size:17px;font-weight:500;color:var(--foam)}
.brand-name span{color:var(--teal)}
.brand-sep{width:1px;height:15px;background:var(--mist2)}
.page-title{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(232,244,246,.35)}
.topbar-right{display:flex;align-items:center;gap:9px;margin-left:auto}
.tbar-btn{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(232,244,246,.38);border:1px solid var(--mist2);padding:4px 9px;border-radius:2px;cursor:pointer;text-decoration:none;transition:all .15s;background:transparent}
.tbar-btn:hover{color:var(--foam2);border-color:var(--teal-dim)}
.tbar-btn.teal{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-glow)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:ld 2.5s ease-in-out infinite}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.25}}
.run-ts{font-size:9px;color:rgba(232,244,246,.24)}

.kpi-strip{position:absolute;top:48px;left:0;right:0;z-index:999;background:rgba(7,30,46,0.94);border-bottom:1px solid var(--mist2);padding:0 18px;display:flex;align-items:stretch;backdrop-filter:blur(4px)}
.kpi-cell{display:flex;flex-direction:column;justify-content:center;padding:7px 14px;border-right:1px solid var(--mist2);min-width:110px;gap:2px}
.kpi-cell:last-child{border-right:none;margin-left:auto}
.kpi-lbl{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,244,246,.26)}
.kpi-val{font-family:var(--serif);font-size:18px;font-weight:500;line-height:1;color:var(--foam)}
.kpi-val.red{color:var(--alert)}.kpi-val.amber{color:var(--warn)}.kpi-val.teal{color:var(--teal)}.kpi-val.orange{color:var(--conflict)}
.kpi-sub{font-size:7px;color:rgba(232,244,246,.26)}

.legend{position:absolute;bottom:18px;left:18px;z-index:999;background:rgba(7,30,46,0.92);border:1px solid var(--mist2);border-radius:3px;padding:11px 13px;backdrop-filter:blur(4px);min-width:180px}
.legend-title{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,244,246,.26);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--mist2)}
.lg-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.lg-row:last-child{margin-bottom:0}
.lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1.5px solid}
.lg-sq{width:10px;height:10px;flex-shrink:0;border:1.5px solid rgba(232,244,246,0.4)}
.lg-line{width:20px;height:2px;border-radius:1px;flex-shrink:0}
.lg-label{font-size:9px;color:rgba(232,244,246,.52)}
.lg-sep{border-top:1px solid var(--mist2);margin:6px 0}

.filter-panel{position:absolute;bottom:18px;right:18px;z-index:999;background:rgba(7,30,46,0.92);border:1px solid var(--mist2);border-radius:3px;padding:11px 13px;backdrop-filter:blur(4px);min-width:175px}
.fp-title{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,244,246,.26);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--mist2)}
.fp-group{margin-bottom:8px}
.fp-grouplbl{font-size:8px;color:rgba(232,244,246,.28);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.fp-btns{display:flex;flex-wrap:wrap;gap:4px}
.fp-btn{font-size:8px;letter-spacing:.04em;padding:2px 7px;border-radius:2px;border:1px solid var(--mist2);cursor:pointer;color:rgba(232,244,246,.42);background:transparent;transition:all .15s}
.fp-btn:hover{color:var(--foam2)}
.fp-btn.on{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-glow)}
.fp-btn.on.red{color:var(--alert);border-color:var(--alert-bdr);background:var(--alert-dim)}
.fp-btn.on.amber{color:var(--warn);border-color:var(--warn-bdr);background:var(--warn-dim)}

.conflict-tooltip{background:rgba(7,30,46,0.96);border:1px solid var(--conflict);border-radius:3px;padding:10px 12px;font-family:var(--mono);font-size:9px;color:var(--foam);min-width:200px;max-width:260px}
.ct-title{font-size:11px;font-weight:700;color:var(--conflict);margin-bottom:6px;letter-spacing:.02em}
.ct-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(232,244,246,.06)}
.ct-row:last-child{border-bottom:none}
.ct-key{color:rgba(232,244,246,.45)}
.ct-val{color:var(--foam);font-weight:500}
.ct-val.danger{color:var(--conflict)}

.leaflet-popup-content-wrapper{background:rgba(7,30,46,0.97)!important;border:1px solid var(--mist2)!important;border-radius:3px!important;box-shadow:none!important;padding:0!important;color:var(--foam)!important}
.leaflet-popup-content{margin:0!important;padding:0!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{color:rgba(232,244,246,.3)!important;font-size:16px!important;top:7px!important;right:9px!important}
.leaflet-popup-close-button:hover{color:var(--foam)!important}
.popup-inner{padding:13px 15px;min-width:215px}
.pop-id{font-size:12px;font-weight:700;color:var(--foam);letter-spacing:.04em;margin-bottom:2px}
.pop-vessel{font-size:10px;color:rgba(232,244,246,.42);margin-bottom:8px}
.pop-stg{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:2px;font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border:1px solid;margin-bottom:8px}
.pop-stg.GATE_IN{color:var(--foam2);border-color:var(--mist2);background:var(--mist)}
.pop-stg.AT_SEA{color:var(--teal);border-color:var(--teal-dim);background:var(--teal-glow)}
.pop-stg.ARRIVED{color:#64C8CC;border-color:rgba(100,200,204,.3);background:rgba(100,200,204,.08)}
.pop-stg.IN_FREE_DAYS{color:var(--warn);border-color:var(--warn-bdr);background:var(--warn-dim)}
.pop-stg.OVERDUE{color:var(--alert);border-color:var(--alert-bdr);background:var(--alert-dim)}
.pop-rows{display:flex;flex-direction:column;gap:4px;border-top:1px solid var(--mist2);padding-top:8px}
.pop-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.pop-key{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:rgba(232,244,246,.28)}
.pop-val{font-size:10px;font-weight:500}
.pop-val.red{color:var(--alert)}.pop-val.amber{color:var(--warn)}.pop-val.teal{color:var(--teal)}
.pop-prog-wrap{border-top:1px solid var(--mist2);padding-top:8px;margin-top:2px}
.pop-prog-lbl{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:rgba(232,244,246,.28);margin-bottom:4px;display:flex;justify-content:space-between}
.pop-prog-track{height:4px;background:rgba(232,244,246,.08);border-radius:2px;overflow:hidden}
.pop-prog-fill{height:100%;border-radius:2px}

#map{position:absolute;top:0;left:0;right:0;bottom:0}
.leaflet-container{background:#030D18}
</style>
</head>

function getRoute(o, d) {
  return ROUTES[o+'-'+d] || ROUTES[d+'-'+o]?.slice().reverse() || (PORTS[o]&&PORTS[d]?[PORTS[o],PORTS[d]]:null);
}

function lerp(route, t) {
  if (!route || route.length < 2) return null;
  const n = route.length - 1;
  const seg = Math.min(Math.floor(t * n), n - 1);
  const f   = t * n - seg;
  const a = route[seg], b = route[seg + 1];
  return [a[0] + (b[0]-a[0])*f, a[1] + (b[1]-a[1])*f];
}

// ══ Icon factories ══
function containerIcon(color, size, pulse){
  const p = pulse ? `<circle cx="10" cy="10" r="${size+5}" fill="${color}" opacity="0.12"/>` : '';
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'>${p}<circle cx='10' cy='10' r='${size}' fill='${color}' opacity='0.92'/><circle cx='10' cy='10' r='${size*0.45}' fill='white' opacity='0.55'/></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[20,20],iconAnchor:[10,10]});
}

function portIcon(){
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='8' height='8' viewBox='0 0 8 8'><rect x='1' y='1' width='6' height='6' rx='1' fill='rgba(232,244,246,0.1)' stroke='rgba(232,244,246,0.35)' stroke-width='1'/></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[8,8],iconAnchor:[4,4]});
}

function conflictIcon(severity){
  // Pulsating orange/red triangle — distinct from container circles
  const col = severity==='CRITICAL' ? '#FF2D2D' : '#FF6B00';
  const pulse = severity==='CRITICAL'
    ? `<circle cx="12" cy="12" r="14" fill="${col}" opacity="0.15" class="conflict-pulse"/>`
    : '';
  const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'>${pulse}<polygon points='12,2 22,21 2,21' fill='${col}' opacity='0.92' stroke='white' stroke-width='1'/><text x='12' y='16' text-anchor='middle' font-size='9' font-weight='bold' fill='white'>!</text></svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[24,24],iconAnchor:[12,21]});
}

// ══ Popup builders ══
function buildContainerPopup(d){
  const sc  = STATUS_COLOR[d.action_status]||'#0A9396';
  const dtl = Number(d.days_to_lfd||0);
  const dtlCls = dtl<=0?'red':dtl<=2?'amber':'teal';
  const pct = Number(d.voyage_pct||50);
  const progCol = pct>=80?'#E05252':pct>=60?'#D4A030':'#0A9396';
  const pen = Number(d.burn_rate_usd||0);
  const vessel = d.vessel_name || d.berthed_vessel || '—';
  return `<div class="popup-inner">
    <div class="pop-id">${d.container_id}</div>
    <div class="pop-vessel">${vessel}</div>
    <span class="pop-stg ${d.lifecycle_stage}">${STAGE_LABEL[d.lifecycle_stage]||d.lifecycle_stage}</span>
    <div class="pop-rows">
      <div class="pop-row"><div class="pop-key">Route</div><div class="pop-val">${d.origin_locode}→${d.dest_locode}</div></div>
      <div class="pop-row"><div class="pop-key">Lane</div><div class="pop-val">${d.trade_lane_label||d.trade_lane||'—'}</div></div>
      <div class="pop-row"><div class="pop-key">Lease</div><div class="pop-val">${d.lease_type||'—'}</div></div>
      <div class="pop-row"><div class="pop-key">Buffer</div><div class="pop-val ${dtlCls}">${dtl>=0?'+':''}${dtl.toFixed(1)}d</div></div>
      <div class="pop-row"><div class="pop-key">Exposure</div><div class="pop-val ${dtl<=0?'red':''}">${dtl<=0?'$'+Math.round(pen).toLocaleString()+' penalty':'$'+(d.per_diem_rate||0)+'/day'}</div></div>
      <div class="pop-row"><div class="pop-key">7d Forecast</div><div class="pop-val amber">$${Math.round(d.projected_exposure_7d_usd||0).toLocaleString()}</div></div>
      <div class="pop-row"><div class="pop-key">Strategy</div><div class="pop-val" style="font-size:9px;color:var(--teal)">${d.repo_strategy||'—'}</div></div>
      <div class="pop-row"><div class="pop-key">Status</div><div class="pop-val" style="color:${sc}">${d.action_status}</div></div>
    </div>
    <div class="pop-prog-wrap">
      <div class="pop-prog-lbl"><span>Voyage</span><span>${pct}%</span></div>
      <div class="pop-prog-track"><div class="pop-prog-fill" style="width:${pct}%;background:${progCol}"></div></div>
    </div>
  </div>`;
}

function buildConflictPopup(zone){
  const col = zone.severity==='CRITICAL'?'#FF2D2D':'#FF6B00';
  const rows = Object.entries(zone.data).map(([k,v])=>
    `<div class="ct-row"><span class="ct-key">${k}</span><span class="ct-val ${k.includes('Risk')||k.includes('Status')?'danger':''}">${v}</span></div>`
  ).join('');
  return `<div class="conflict-tooltip">
    <div class="ct-title">⚠ ${zone.name}</div>
    ${rows}
    <div style="margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,107,0,.3);font-size:8px;color:rgba(232,244,246,.45)">${zone.advisory}</div>
  </div>`;
}

// ══ Render ══
function render(){
  clearLayers();

  const visible = DATA.filter(d=>
    activeStatus.has(d.action_status) &&
    activeStage.has(d.lifecycle_stage) &&
    activeLane.has(d.trade_lane)
  );

  const portsShown = new Set();

  visible.forEach(d=>{
    const o   = d.origin_locode, dest = d.dest_locode;
    const oPos = PORTS[o], dPos = PORTS[dest];
    const route = getRoute(o, dest);
    const color = STATUS_COLOR[d.action_status]||'#0A9396';
    const pct   = Math.max(0, Math.min(1, Number(d.voyage_pct||0)/100));

    // ── Route line (clean, no trail dots) ──────────────────────────────────
    if (route && route.length >= 2) {
      const isCrit = d.action_status==='Critical';
      const line = L.polyline(route, {
        color:     isCrit?'#E05252':d.action_status==='Warning'?'#D4A030':'rgba(10,147,150,0.45)',
        weight:    isCrit?1.5:1,
        opacity:   isCrit?0.65:0.35,
        dashArray: null,  // no dashes — clean lines only
      }).addTo(map);
      allLayers.push(line);

      // Port squares at origin + destination only
      [o, dest].forEach(code=>{
        if(!PORTS[code]||portsShown.has(code)) return;
        portsShown.add(code);
        allLayers.push(L.marker(PORTS[code],{icon:portIcon(),interactive:false}).addTo(map));
      });
    }

    // ── Container position dot ──────────────────────────────────────────────
    let lat = Number(d.current_lat||0), lon = Number(d.current_lon||0);

    // For AT_SEA: always compute from route geometry for accurate ocean placement
    if (d.lifecycle_stage==='AT_SEA' && route) {
      const pos = lerp(route, Math.max(0.02, Math.min(0.98, pct)));
      if (pos) { lat=pos[0]; lon=pos[1]; }
    }

    // Port stages: snap to port coordinates
    if (['GATE_IN'].includes(d.lifecycle_stage) && oPos) { lat=oPos[0]; lon=oPos[1]; }
    if (['ARRIVED','IN_FREE_DAYS','OVERDUE'].includes(d.lifecycle_stage) && dPos) { lat=dPos[0]; lon=dPos[1]; }

    if (Math.abs(lat)<0.1 && Math.abs(lon)<0.1) return;

    const sz    = d.lifecycle_stage==='AT_SEA'?6:5;
    const pulse = d.action_status==='Critical';

    const marker = L.marker([lat,lon],{
      icon:L.divIcon({
        html: (()=>{
          const p = pulse?`<circle cx="10" cy="10" r="${sz+5}" fill="${color}" opacity="0.12"/>`:''
          return `<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20'>${p}<circle cx='10' cy='10' r='${sz}' fill='${color}' opacity='0.92'/><circle cx='10' cy='10' r='${sz*0.45}' fill='white' opacity='0.55'/></svg>`;
        })(),
        className:'',iconSize:[20,20],iconAnchor:[10,10]
      }),
      zIndexOffset: pulse?1000:d.lifecycle_stage==='AT_SEA'?500:0,
    })
    .bindPopup(buildContainerPopup(d),{maxWidth:260})
    .addTo(map);
    allLayers.push(marker);
  });

  // ── Conflict zone markers (always shown, on top) ────────────────────────
  CONFLICT_ZONES.forEach(zone=>{
    const icon = conflictIcon(zone.severity);
    const col  = zone.severity==='CRITICAL'?'#FF2D2D':'#FF6B00';
    // Pulsating ring around the marker
    const ring = L.circle([zone.lat, zone.lon], {
      radius:     zone.severity==='CRITICAL'?180000:120000,
      color:      col,
      fillColor:  col,
      fillOpacity:0.06,
      weight:     1.5,
      opacity:    0.45,
      dashArray:  '6,4',
    }).addTo(map);
    allLayers.push(ring);

    const m = L.marker([zone.lat, zone.lon],{icon, zIndexOffset:2000})
      .bindPopup(buildConflictPopup(zone),{maxWidth:280,className:''})
      .addTo(map);
    allLayers.push(m);
  });

  renderKPIs(visible);
}

function renderKPIs(visible){
  const all  = DATA;
  const crit = all.filter(d=>d.action_status==='Critical').length;
  const warn = all.filter(d=>d.action_status==='Warning').length;
  const safe = all.filter(d=>d.action_status==='Safe').length;
  const pen  = all.filter(d=>(d.days_to_lfd||0)<=0).reduce((s,d)=>s+Number(d.burn_rate_usd||0),0);
  const proj = all.reduce((s,d)=>s+Number(d.projected_exposure_7d_usd||0),0);
  const kpis = [
    {l:'Critical',   v:crit,                              c:'red',    s:'penalty accruing'},
    {l:'Warning',    v:warn,                              c:'amber',  s:'≤ 2d buffer'},
    {l:'Safe',       v:safe,                              c:'teal',   s:'buffer > 2d'},
    {l:'Penalty',    v:'$'+Math.round(pen).toLocaleString(),c:'',    s:'USD today'},
    {l:'7d Forecast',v:'$'+Math.round(proj).toLocaleString(),c:'red',s:'projected'},
    {l:'Conflict Zones',v:CONFLICT_ZONES.length,         c:'orange', s:'active Apr 2026'},
    {l:'Showing',    v:visible.length+'/'+all.length,    c:'',       s:'on map'},
  ];
  document.getElementById('kpi-strip').innerHTML =
    kpis.map(k=>`<div class="kpi-cell"><div class="kpi-lbl">${k.l}</div><div class="kpi-val ${k.c}">${k.v}</div><div class="kpi-sub">${k.s}</div></div>`).join('');
}

document.querySelectorAll('.fp-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const f=btn.dataset.filter, v=btn.dataset.val;
    const s=f==='status'?activeStatus:f==='stage'?activeStage:activeLane;
    if(s.has(v)){s.delete(v);btn.classList.remove('on');}else{s.add(v);btn.classList.add('on');}
    render();
  });
});

async function doRefresh(){
  const btn=document.getElementById('map-refresh');
  btn.textContent='⟳ Loading...';btn.style.opacity='.5';
  await loadData();
  btn.textContent='✓ Done';
  setTimeout(()=>{btn.textContent='⟳ Refresh';btn.style.opacity='1';},2000);
}

async function loadData(){
  try{
    const[dr,sr]=await Promise.all([
      fetch('./data/gold/containers.json?t='+Date.now()),
      fetch('./data/gold/summary.json?t='+Date.now()),
    ]);
    DATA=await dr.json();
    const sum=await sr.json();
    document.getElementById('run-ts').textContent='Run #'+(sum.run_count||'?')+' · '+(sum.generated_at||'').slice(0,16).replace('T',' ')+' UTC';
  }catch(e){
    DATA=FALLBACK;
    document.getElementById('run-ts').textContent='Offline · sample';
  }
  render();
}
